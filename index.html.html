<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حاسبة تكلفة الشحن</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      direction: rtl;
      background: #f7f7f7;
    }
    .container {
      max-width: 520px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
    }
    h2 {
      margin-top: 0;
      color: #222;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .result {
      margin-top: 18px;
      font-size: 18px;
      line-height: 1.8;
      text-align: right;
      color: #1b5e20;
      background: #f1fff3;
      padding: 14px;
      border-radius: 10px;
    }
    .note {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📦 حاسبة تكلفة الشحن</h2>

    <input id="dimensions" type="text" placeholder="الأبعاد (مثال: 88*32*44)">
    <input id="yuan" type="number" step="0.01" placeholder="سعر القطعة باليوان">
    <input id="rate" type="number" step="0.01" placeholder="سعر صرف اليوان مقابل الدولار">
    <input id="quantity" type="number" step="1" placeholder="عدد القطع في الكارتون">

    <button onclick="calculate()">احسب</button>

    <div class="result" id="output"></div>

    <div class="note">
      الشحن: 230 دولار للمتر المكعب × 1500 دينار<br>
      سعر القطعة: يوان → دولار → دينار بسعر 1400
    </div>
  </div>

  <script>
    function calculate() {
      const dimsText = document.getElementById('dimensions').value.trim();
      const yuan = parseFloat(document.getElementById('yuan').value);
      const rate = parseFloat(document.getElementById('rate').value);
      const qty = parseInt(document.getElementById('quantity').value, 10);

      const usdPerM3 = 230;            // سعر المتر بالدولار
      const iqdPerUsdShipping = 1500;  // سعر الدولار للشحن
      const iqdPerUsdItem = 1400;      // سعر الدولار لتحويل سعر السلعة

      const parts = dimsText.split('*').map(v => parseFloat(v));

      if (
        parts.length !== 3 ||
        parts.some(v => isNaN(v) || v <= 0) ||
        isNaN(yuan) || yuan <= 0 ||
        isNaN(rate) || rate <= 0 ||
        isNaN(qty) || qty <= 0
      ) {
        document.getElementById('output').innerHTML = '⚠️ تأكد من إدخال الأبعاد وسعر اليوان وسعر الصرف وعدد القطع بشكل صحيح.';
        return;
      }

      const [l, w, h] = parts;
      const volume = (l * w * h) / 1000000;

      const shippingTotal = volume * usdPerM3 * iqdPerUsdShipping;
      const shippingPerUnit = shippingTotal / qty;

      const usdPrice = yuan / rate;
      const itemCostIQD = usdPrice * iqdPerUsdItem;

      const totalPerUnit = shippingPerUnit + itemCostIQD + 3000;

      document.getElementById('output').innerHTML = `
        ✅ حجم الكارتون: ${volume.toFixed(4)} م³<br>
        🚚 شحن الكارتون: ${shippingTotal.toFixed(2)} دينار<br>
        📦 شحن للقطعة: ${shippingPerUnit.toFixed(2)} دينار<br>
        💰 سعر القطعة: ${itemCostIQD.toFixed(2)} دينار<br>
        💳 السعر النهائي للقطعة: ${totalPerUnit.toFixed(2)} دينار
      `;
    }
  </script>
</body>
</html>
